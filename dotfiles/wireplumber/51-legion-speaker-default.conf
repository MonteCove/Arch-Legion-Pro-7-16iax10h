# ~/.config/wireplumber/wireplumber.conf.d/51-legion-speaker-default.conf
#
# Legion Pro 7 16IAX10H — keep the internal AW88399 speakers as the default output
# and stop audio from being auto-hijacked to an external DisplayPort/HDMI monitor.
#
# WHY THIS EXISTS
#   This laptop's sound card (ALC287 + AW88399 amp on the SOF/sof-hda-dsp card) exposes
#   Speaker and Headphones as two *mutually exclusive* ALSA/UCM profiles:
#       HiFi (HDMI1, HDMI2, HDMI3, Headphones, Mic1)   profile priority 10200  <- ships preferred
#       HiFi (HDMI1, HDMI2, HDMI3, Mic1, Speaker)       profile priority 10100
#   The Headphones profile has NO speaker sink. If WirePlumber is on that profile with no
#   headphones plugged in, the only *available* outputs are the HDMI/DP ports, so a connected
#   monitor (e.g. the XG32UCWMG) silently becomes the default sink -> no sound from the laptop.
#   EasyEffects follows the default sink, so its whole EQ chain gets pumped into the monitor too.
#
#   Because the shipped Headphones profile has the higher priority (10200 > 10100), on a fresh
#   WirePlumber state the card auto-picks Headphones and re-triggers the bug. This rule pins the
#   Speaker profile as *preferred* (device/find-preferred-profile runs BEFORE the priority-based
#   device/find-best-profile), so the Speaker sink always exists. On that profile the Speaker
#   node (priority.session 1000) also out-ranks every HDMI/DP sink (664-696), so a monitor can
#   never auto-win the default either.
#
#   This is belt-and-suspenders alongside WirePlumber's stored state
#   (~/.local/state/wireplumber/{default-nodes,default-profile}); the rule is what makes the fix
#   survive even a full state reset / fresh profile.
#
# Want headphones or the monitor as default instead? Just select it in your audio applet, or:
#   wpctl set-default <id>       # WirePlumber remembers explicit choices (+30000 priority boost)

device.profile.priority.rules = [
  {
    matches = [
      {
        device.name = "alsa_card.pci-0000_80_1f.3-platform-skl_hda_dsp_generic"
      }
    ]
    actions = {
      update-props = {
        # lower index = higher priority
        priorities = [
          "HiFi (HDMI1, HDMI2, HDMI3, Mic1, Speaker)",
          "HiFi (HDMI1, HDMI2, HDMI3, Headphones, Mic1)",
        ]
      }
    }
  }
]
