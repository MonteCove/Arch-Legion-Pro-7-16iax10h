# /* ---- 16IAX10H user overrides ---- */
# Deployed by Build_16iax10h_tweaks.sh (display module) and sourced from
# UserConfigs/UserKeybinds.conf. Self-contained: it re-declares the vars it uses
# so it doesn't depend on source order.

$mainMod = SUPER
$scriptsDir = $HOME/.config/hypr/scripts

# Super+L -> lock screen.
# JaKooLit's stock lock bind is Ctrl+Alt+L; plain Super+L is otherwise unbound.
# Reuses the same resolution-aware LockScreen.sh as the stock bind.
bindd = $mainMod, L, lock screen, exec, $scriptsDir/LockScreen.sh

# hyprsunset warm-light temperature in Kelvin (lower = warmer / redder).
# Read by scripts/Hyprsunset.sh as HYPRSUNSET_TEMP (its built-in default is 4500).
# 3000K = strong warm/red (incandescent-ish). Toggle warm light with Super+N.
env = HYPRSUNSET_TEMP,3000
