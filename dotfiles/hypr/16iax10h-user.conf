# /* ---- 16IAX10H user overrides ---- */
# Deployed by Build_16iax10h_tweaks.sh (display module) and sourced from
# UserConfigs/UserKeybinds.conf. Self-contained: it re-declares the vars it uses
# so it doesn't depend on source order.

$mainMod = SUPER
$scriptsDir = $HOME/.config/hypr/scripts

# Super+L -> lock screen.
# JaKooLit's stock lock bind is Ctrl+Alt+L; plain Super+L is otherwise unbound.
# Reuses the same resolution-aware LockScreen.sh as the stock bind.
bindd = $mainMod, L, lock screen, exec, $scriptsDir/LockScreen.sh

# hyprsunset warm-light temperature in Kelvin (lower = warmer / redder).
# Read by scripts/Hyprsunset.sh as HYPRSUNSET_TEMP (its built-in default is 4500).
# 3000K = strong warm/red (incandescent-ish). Toggle warm light with Super+N.
env = HYPRSUNSET_TEMP,3000

# Disable VRR on the Samsung ATNA60HU01 OLED panel. Its VRR implementation blanks
# the panel for ~2s on engage, which breaks entering fullscreen video (press 'f' on
# a YouTube video -> black screen -> fullscreen fails). JaKooLit sets vrr=2 in
# configs/SystemSettings.conf; this drop-in is sourced AFTER it (line 36 > 32), so
# vrr=0 wins. Panel stays a fixed 240Hz; VRR off is the standard fix for ATNA* OLED.
misc {
    vrr = 0
}

# Re-apply AC/battery state (panel Hz, NVR stack) when the session comes up —
# udev only fires on plug/unplug, so without this a boot on battery would sit
# at 240 Hz until the first power event. Runs unprivileged (hyprctl + docker grp).
exec-once = /usr/local/bin/16iax10h-power-dispatch
