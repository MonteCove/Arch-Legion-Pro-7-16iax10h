# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# Hypridle — tuned for the OLED panel: dim -> turn the screen OFF -> lock.
# Turning the panel OFF (dpms off) is what protects OLED: black pixels are truly
# off, so no burn-in and near-zero power. Original config saved at hypridle.conf.bak.
#
# Order here is screen-OFF BEFORE lock. Tradeoff: between the screen turning off
# and the lock firing, waking the panel briefly shows the unlocked desktop. The
# gap is kept small (30s); to close it, set the lock timeout equal-ish to the
# dpms one, or to lock first put the lock listener back above the dpms one.
#
# Adjust the timeouts to taste (seconds). Video players / Steam / Firefox send
# idle-inhibit, so playback won't trigger any of this (ignore_dbus_inhibit=false).

$iDIR="$HOME/.config/swaync/images/ja.png"

general {
    lock_cmd = pidof hyprlock || hyprlock         # lock (idempotent: won't stack)
    before_sleep_cmd = loginctl lock-session      # lock before the machine sleeps
    after_sleep_cmd = hyprctl dispatch dpms on    # ensure the panel comes back on after wake
    ignore_dbus_inhibit = false                   # honor idle-inhibitors (mpv, browsers, Steam)
}

# 1) Dim the backlight as a gentle "you're idle" cue (saved, then restored). 2.5 min.
listener {
    timeout = 150
    on-timeout = brightnessctl -d intel_backlight -s set 5%
    on-resume  = brightnessctl -d intel_backlight -r
}

# 2) Turn the OLED panel fully OFF (true black -> no burn-in). 3 min.
listener {
    timeout = 180
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}

# 3) Lock the session (fires while the panel is already off; you see hyprlock on wake). 5 min.
listener {
    timeout = 300
    on-timeout = loginctl lock-session
}

# 4) After a long idle, suspend-then-hibernate (15 min): it suspends for instant
#    resume, then systemd wakes after HibernateDelaySec (sleep.conf.d, on battery)
#    and hibernates to disk -- so an idle laptop on battery saves your session and
#    powers off cleanly instead of silently draining to death. Needs the 'hibernate'
#    module (swapfile + resume=) installed; on AC it just stays suspended.
listener {
    timeout = 900
    on-timeout = systemctl suspend-then-hibernate
}
