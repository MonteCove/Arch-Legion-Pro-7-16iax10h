# /etc/X11/xorg.conf.d/10-igpu-only.conf
# (installed by Build_16iax10h_battery.sh)
#
# SDDM's greeter X server keeps running after login into the Hyprland (Wayland)
# session, and it was holding /dev/nvidia0 open forever — pinning the RTX 5080
# in P8 (~5-10 W) instead of letting it power off entirely (D3cold, ~0 W).
# The internal panel is wired to the Intel iGPU, so X does not need the dGPU.
#
# This pins any Xorg instance to the iGPU and stops auto-adding secondary GPUs.
# Wayland/Hyprland and Xwayland are NOT affected by this file.
# Side effect: a full X11 desktop session could no longer PRIME-offload to the
# NVIDIA GPU. You only use Hyprland; if you ever need X11+NVIDIA, delete this.
Section "ServerFlags"
    Option "AutoAddGPU" "off"
EndSection

Section "Device"
    Identifier "Intel iGPU"
    Driver "modesetting"
    BusID "PCI:0:2:0"
EndSection
