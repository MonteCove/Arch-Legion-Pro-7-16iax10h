# /etc/tlp.d/00-16iax10h-battery.conf
# Legion Pro 7 16IAX10H battery-life profile (installed by Build_16iax10h_battery.sh).
#
# Works WITH legion-powercapd, not against it: TLP re-asserts the ACPI platform
# profile whenever the power source changes; the powercap daemon reads that
# profile and applies the matching RAPL limit (quiet=45W / balanced=90W /
# performance=130W). Fn-Q still works anytime in between.

# Keep today's behavior on AC; drop the EC to quiet mode on battery.
PLATFORM_PROFILE_ON_AC=performance
PLATFORM_PROFILE_ON_BAT=quiet

# HWP energy/perf hints (intel_pstate active mode). This was stuck at
# balance_performance even on battery because nothing managed it.
CPU_ENERGY_PERF_POLICY_ON_AC=balance_performance
CPU_ENERGY_PERF_POLICY_ON_BAT=power

CPU_SCALING_GOVERNOR_ON_AC=powersave
CPU_SCALING_GOVERNOR_ON_BAT=powersave

# Turbo stays available on battery (the powercapd 90W battery RAPL cap already
# bounds sustained draw); HWP dynamic boost off on battery.
CPU_BOOST_ON_AC=1
CPU_BOOST_ON_BAT=1
CPU_HWP_DYN_BOOST_ON_AC=1
CPU_HWP_DYN_BOOST_ON_BAT=0

# Let PCIe links sleep hard on battery (dGPU root port, NVMe, wifi). Was [default].
PCIE_ASPM_ON_AC=default
PCIE_ASPM_ON_BAT=powersupersave

# Runtime-suspend idle PCI devices on AC too, so the RTX 5080 can reach D3cold
# whenever nothing uses it (TLP's stock AC value is 'on' = never suspend).
RUNTIME_PM_ON_AC=auto
RUNTIME_PM_ON_BAT=auto

# Preserve the current 10s audio-codec powersave on both sources.
SOUND_POWER_SAVE_ON_AC=10
SOUND_POWER_SAVE_ON_BAT=10
SOUND_POWER_SAVE_CONTROLLER=Y

# Wifi powersave was already on; make it explicit so it survives driver resets.
WIFI_PWR_ON_AC=on
WIFI_PWR_ON_BAT=on

# The I226-V ethernet PHY stays awake for Wake-on-LAN otherwise.
WOL_DISABLE=Y

# Kernel NMI watchdog: periodic tick with no laptop use case.
NMI_WATCHDOG=0
